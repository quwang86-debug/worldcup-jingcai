<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026世界杯赛程 - 北京时间</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #627084;
      --line: #dbe2ea;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --soft-2: #edf3f7;
      --brand: #0c7c6a;
      --brand-dark: #075848;
      --gold: #c78b18;
      --red: #b34338;
      --blue: #2468a8;
      --shadow: 0 14px 40px rgba(24, 33, 47, .08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(12, 124, 106, .12), transparent 34%),
        linear-gradient(300deg, rgba(199, 139, 24, .12), transparent 36%),
        #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .86);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-inner {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 18px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.05;
      font-weight: 850;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .clock-chip {
      justify-self: end;
      display: grid;
      gap: 2px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      min-width: 178px;
      text-align: right;
      box-shadow: 0 8px 24px rgba(24, 33, 47, .06);
    }

    .clock-chip strong {
      font-size: 18px;
    }

    .clock-chip span {
      color: var(--muted);
      font-size: 12px;
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 18px 24px 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 18px;
      align-items: start;
    }

    .filters,
    .stats-panel,
    .match-list,
    .spotlight {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .filters {
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(190px, 1.2fr) minmax(130px, .8fr) minmax(130px, .8fr) auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-width: 0;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 11px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(12, 124, 106, .14);
    }

    .reset-btn {
      height: 42px;
      border: 1px solid var(--brand);
      border-radius: var(--radius);
      color: #fff;
      background: var(--brand);
      padding: 0 16px;
      cursor: pointer;
      font-weight: 750;
      white-space: nowrap;
    }

    .content {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .spotlight {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      overflow: hidden;
    }

    .spotlight h2,
    .stats-panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .spotlight-match {
      margin-top: 9px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 850;
      line-height: 1.15;
    }

    .spotlight-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .meter {
      width: min(280px, 28vw);
      display: grid;
      gap: 8px;
    }

    .meter-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft-2);
      display: flex;
    }

    .meter-track span:nth-child(1) {
      background: var(--brand);
    }

    .meter-track span:nth-child(2) {
      background: var(--gold);
    }

    .meter-track span:nth-child(3) {
      background: var(--blue);
    }

    .meter-labels {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }

    .match-list {
      overflow: hidden;
    }

    .list-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .list-head strong {
      font-size: 16px;
    }

    .list-head span {
      color: var(--muted);
      font-size: 13px;
    }

    .day-group {
      border-bottom: 1px solid var(--line);
    }

    .day-title {
      padding: 9px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: #eef4f5;
      color: var(--brand-dark);
      font-weight: 850;
      border-bottom: 1px solid var(--line);
    }

    .match-row {
      display: grid;
      grid-template-columns: 78px 92px minmax(180px, 1fr) 86px minmax(160px, .7fr);
      gap: 12px;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid #edf1f5;
      background: #fff;
    }

    .match-row:last-child {
      border-bottom: 0;
    }

    .match-row.is-live {
      box-shadow: inset 4px 0 0 var(--red);
    }

    .time {
      font-size: 22px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .badge.done {
      border-color: rgba(12, 124, 106, .22);
      background: rgba(12, 124, 106, .08);
      color: var(--brand-dark);
    }

    .teams {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .fixture {
      font-size: 17px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .abbr {
      color: var(--muted);
      font-size: 12px;
    }

    .score {
      justify-self: center;
      min-width: 64px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .score.pending {
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    .venue {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      min-width: 0;
    }

    aside {
      position: sticky;
      top: 98px;
      display: grid;
      gap: 14px;
    }

    .stats-panel {
      padding: 15px;
    }

    .stat-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      padding: 12px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-width: 0;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .bars {
      margin-top: 13px;
      display: grid;
      gap: 9px;
    }

    .bar {
      display: grid;
      grid-template-columns: 78px 1fr 32px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bar-track {
      height: 8px;
      background: var(--soft-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--brand), var(--gold));
      border-radius: 999px;
    }

    .empty {
      padding: 36px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (min-aspect-ratio: 16/9) and (min-width: 1000px) {
      main {
        grid-template-columns: minmax(0, 1fr) 360px;
      }

      .match-row {
        grid-template-columns: 88px 100px minmax(240px, 1fr) 92px minmax(220px, .7fr);
      }
    }

    @media (max-width: 980px) {
      .topbar-inner {
        grid-template-columns: 1fr;
      }

      .clock-chip {
        justify-self: stretch;
        text-align: left;
      }

      main {
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
      }

      .filters {
        grid-template-columns: 1fr 1fr;
      }

      .reset-btn {
        grid-column: span 2;
      }

      .spotlight {
        grid-template-columns: 1fr;
      }

      .meter {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner,
      main {
        padding-left: 12px;
        padding-right: 12px;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .reset-btn {
        grid-column: auto;
        width: 100%;
      }

      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .match-row {
        grid-template-columns: 62px 1fr 52px;
        gap: 8px;
        padding: 12px;
      }

      .match-row .badge,
      .match-row .venue {
        grid-column: 2 / 4;
      }

      .time {
        align-self: start;
        font-size: 18px;
      }

      .fixture {
        font-size: 15px;
      }

      .score {
        min-width: 46px;
        font-size: 18px;
      }

      .day-title {
        padding-left: 12px;
        padding-right: 12px;
      }
    }

    @media (max-width: 420px) {
      .spotlight-match {
        font-size: 20px;
      }

      .bar {
        grid-template-columns: 76px minmax(0, 1fr) 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>2026世界杯赛程</h1>
          <p class="subtitle">全部时间已换算为北京时间，数据来自本地赛程文件。</p>
        </div>
        <div class="clock-chip" aria-label="北京时间">
          <strong id="beijingNow">--:--:--</strong>
          <span id="beijingDate">北京时间</span>
        </div>
      </div>
    </header>

    <main>
      <section class="content">
        <form class="filters" id="filters">
          <div class="field">
            <label for="search">搜索球队 / 城市 / 场馆</label>
            <input id="search" type="search" placeholder="例如：阿根廷、北京、MetLife">
          </div>
          <div class="field">
            <label for="stage">阶段</label>
            <select id="stage"></select>
          </div>
          <div class="field">
            <label for="group">小组</label>
            <select id="group"></select>
          </div>
          <button class="reset-btn" type="button" id="reset">重置</button>
        </form>

        <section class="spotlight" id="spotlight">
          <div>
            <h2>下一场比赛</h2>
            <div class="spotlight-match" id="nextMatch">读取中...</div>
            <div class="spotlight-meta" id="nextMeta"></div>
          </div>
          <div class="meter" aria-label="赛事进度">
            <div class="meter-track" id="progressTrack"></div>
            <div class="meter-labels">
              <span id="doneCount">已完赛 0</span>
              <span id="todoCount">未开赛 0</span>
            </div>
          </div>
        </section>

        <section class="match-list">
          <div class="list-head">
            <strong>赛程列表</strong>
            <span id="resultCount">0 场</span>
          </div>
          <div id="matches"></div>
        </section>
      </section>

      <aside>
        <section class="stats-panel">
          <h2>概览</h2>
          <div class="stat-grid">
            <div class="stat"><strong id="totalStat">0</strong><span>总场次</span></div>
            <div class="stat"><strong id="finishedStat">0</strong><span>已完赛</span></div>
            <div class="stat"><strong id="upcomingStat">0</strong><span>未开赛</span></div>
            <div class="stat"><strong id="todayStat">0</strong><span>今日</span></div>
          </div>
        </section>

        <section class="stats-panel">
          <h2>阶段分布</h2>
          <div class="bars" id="stageBars"></div>
        </section>

        <section class="stats-panel">
          <h2>小组赛分布</h2>
          <div class="bars" id="groupBars"></div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    const DATA_URL = "data/worldcup_2026_matches_beijing.json";
    const stageOrder = ["小组赛", "1/16决赛", "1/8决赛", "1/4决赛", "半决赛", "三四名决赛", "决赛"];
    const state = {
      matches: [],
      filters: {
        search: "",
        stage: "全部",
        group: "全部"
      }
    };

    const el = {
      search: document.querySelector("#search"),
      stage: document.querySelector("#stage"),
      group: document.querySelector("#group"),
      reset: document.querySelector("#reset"),
      matches: document.querySelector("#matches"),
      resultCount: document.querySelector("#resultCount"),
      totalStat: document.querySelector("#totalStat"),
      finishedStat: document.querySelector("#finishedStat"),
      upcomingStat: document.querySelector("#upcomingStat"),
      todayStat: document.querySelector("#todayStat"),
      stageBars: document.querySelector("#stageBars"),
      groupBars: document.querySelector("#groupBars"),
      nextMatch: document.querySelector("#nextMatch"),
      nextMeta: document.querySelector("#nextMeta"),
      progressTrack: document.querySelector("#progressTrack"),
      doneCount: document.querySelector("#doneCount"),
      todoCount: document.querySelector("#todoCount"),
      beijingNow: document.querySelector("#beijingNow"),
      beijingDate: document.querySelector("#beijingDate")
    };

    function beijingNow() {
      return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Shanghai" }));
    }

    function beijingDateKey(date = new Date()) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function updateClock() {
      const now = new Date();
      el.beijingNow.textContent = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);
      el.beijingDate.textContent = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(now);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function setSelectOptions(select, values, label) {
      select.innerHTML = [`<option value="全部">全部${label}</option>`]
        .concat(values.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`))
        .join("");
    }

    function countBy(items, keyFn) {
      return items.reduce((acc, item) => {
        const key = keyFn(item);
        if (key) acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function renderBars(container, counts, order, maxValue) {
      container.innerHTML = order.map((key) => {
        const count = counts[key] || 0;
        const width = maxValue ? Math.round(count / maxValue * 100) : 0;
        return `
          <div class="bar">
            <span>${escapeHtml(key)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
            <strong>${count}</strong>
          </div>
        `;
      }).join("");
    }

    function formatScore(match) {
      if (match.home_score === null || match.away_score === null) return "未赛";
      return `${match.home_score} : ${match.away_score}`;
    }

    function matchSearchText(match) {
      return [
        match.fixture_zh,
        match.fixture,
        match.home_team_abbr,
        match.away_team_abbr,
        match.city,
        match.country,
        match.venue,
        match.stage_zh,
        match.group
      ].join(" ").toLowerCase();
    }

    function getFilteredMatches() {
      const query = state.filters.search.trim().toLowerCase();
      return state.matches.filter((match) => {
        const stageOk = state.filters.stage === "全部" || match.stage_zh === state.filters.stage;
        const groupOk = state.filters.group === "全部" || match.group === state.filters.group;
        const searchOk = !query || matchSearchText(match).includes(query);
        return stageOk && groupOk && searchOk;
      });
    }

    function renderStats() {
      const total = state.matches.length;
      const finished = state.matches.filter((match) => match.status_state === "post").length;
      const today = beijingDateKey();
      const todayCount = state.matches.filter((match) => match.beijing_date === today).length;
      const upcoming = total - finished;
      const doneWidth = total ? finished / total * 100 : 0;
      const todoWidth = 100 - doneWidth;

      el.totalStat.textContent = total;
      el.finishedStat.textContent = finished;
      el.upcomingStat.textContent = upcoming;
      el.todayStat.textContent = todayCount;
      el.doneCount.textContent = `已完赛 ${finished}`;
      el.todoCount.textContent = `未开赛 ${upcoming}`;
      el.progressTrack.innerHTML = `
        <span style="width:${doneWidth}%"></span>
        <span style="width:${todoWidth}%"></span>
      `;

      const stageCounts = countBy(state.matches, (match) => match.stage_zh);
      renderBars(el.stageBars, stageCounts, stageOrder, Math.max(...Object.values(stageCounts)));

      const groupCounts = countBy(state.matches.filter((match) => match.stage_zh === "小组赛"), (match) => `${match.group}组`);
      const groupOrder = "ABCDEFGHIJKL".split("").map((letter) => `${letter}组`);
      renderBars(el.groupBars, groupCounts, groupOrder, 6);
    }

    function renderSpotlight() {
      const now = beijingNow();
      const upcoming = state.matches.find((match) => new Date(match.beijing_datetime) >= now && match.status_state !== "post");
      const match = upcoming || state.matches[state.matches.length - 1];
      if (!match) return;

      el.nextMatch.textContent = match.fixture_zh;
      el.nextMeta.textContent = `${match.beijing_date} ${match.beijing_weekday} ${match.beijing_time} · ${match.stage_zh}${match.group ? " · " + match.group + "组" : ""} · ${match.city}`;
    }

    function renderMatches() {
      const matches = getFilteredMatches();
      el.resultCount.textContent = `${matches.length} 场`;

      if (!matches.length) {
        el.matches.innerHTML = `<div class="empty">没有匹配的比赛</div>`;
        return;
      }

      const grouped = new Map();
      for (const match of matches) {
        const key = `${match.beijing_date} ${match.beijing_weekday}`;
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(match);
      }

      el.matches.innerHTML = [...grouped.entries()].map(([date, dayMatches]) => `
        <section class="day-group">
          <div class="day-title">
            <span>${escapeHtml(date)}</span>
            <span>${dayMatches.length} 场</span>
          </div>
          ${dayMatches.map((match) => {
            const score = formatScore(match);
            const isDone = match.status_state === "post";
            const groupText = match.group ? `${match.group}组 · ` : "";
            return `
              <article class="match-row">
                <div class="time">${escapeHtml(match.beijing_time)}</div>
                <div class="badge ${isDone ? "done" : ""}">${escapeHtml(match.status_zh)}</div>
                <div class="teams">
                  <div class="fixture">${escapeHtml(match.fixture_zh)}</div>
                  <div class="abbr">${escapeHtml(groupText + match.stage_zh)} · ${escapeHtml(match.home_team_abbr)} vs ${escapeHtml(match.away_team_abbr)}</div>
                </div>
                <div class="score ${isDone ? "" : "pending"}">${escapeHtml(score)}</div>
                <div class="venue">${escapeHtml(match.venue)}<br>${escapeHtml(match.city)}, ${escapeHtml(match.country)}</div>
              </article>
            `;
          }).join("")}
        </section>
      `).join("");
    }

    function renderAll() {
      renderStats();
      renderSpotlight();
      renderMatches();
    }

    async function init() {
      updateClock();
      setInterval(updateClock, 1000);

      const response = await fetch(DATA_URL);
      if (!response.ok) throw new Error(`无法读取 ${DATA_URL}`);
      const data = await response.json();
      state.matches = data.matches;

      const stages = stageOrder.filter((stage) => state.matches.some((match) => match.stage_zh === stage));
      const groups = "ABCDEFGHIJKL".split("");
      setSelectOptions(el.stage, stages, "阶段");
      setSelectOptions(el.group, groups, "小组");

      el.search.addEventListener("input", () => {
        state.filters.search = el.search.value;
        renderMatches();
      });
      el.stage.addEventListener("change", () => {
        state.filters.stage = el.stage.value;
        renderMatches();
      });
      el.group.addEventListener("change", () => {
        state.filters.group = el.group.value;
        if (state.filters.group !== "全部") {
          state.filters.stage = "小组赛";
          el.stage.value = "小组赛";
        }
        renderMatches();
      });
      el.reset.addEventListener("click", () => {
        state.filters = { search: "", stage: "全部", group: "全部" };
        el.search.value = "";
        el.stage.value = "全部";
        el.group.value = "全部";
        renderMatches();
      });

      renderAll();
    }

    init().catch((error) => {
      el.matches.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
